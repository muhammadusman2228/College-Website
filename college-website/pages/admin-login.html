<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login – Greenfield College</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/forms.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

    <div class="auth-page">
        <div class="auth-container">
            <a href="../index.html" class="auth-logo">
                <div class="auth-logo-icon" style="background:linear-gradient(135deg,#0f3460,#16213e)">
                    <i class="fa-solid fa-shield-check"></i>
                </div>
                <span class="auth-logo-name">Admin Panel</span>
            </a>

            <h1 class="auth-title">Admin Access</h1>
            <p class="auth-subtitle">Restricted area – authorized personnel only</p>

            <div class="demo-creds">
                <p><i class="fa-solid fa-circle-info"></i> <strong>Demo:</strong> Username: <code
                        style="color:var(--gold)">admin</code> &nbsp;|&nbsp; Password: <code
                        style="color:var(--gold)">admin123</code></p>
            </div>

            <div id="admin-login-error"
                style="display:none;color:var(--danger);font-size:0.82rem;margin-bottom:16px;padding:12px;background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.2);border-radius:var(--radius-md)">
            </div>

            <form id="admin-login-form" novalidate>
                <div class="form-group">
                    <label class="form-label" for="admin-username">Username</label>
                    <div class="input-group">
                        <span class="input-icon"><i class="fa-solid fa-user-shield"></i></span>
                        <input type="text" id="admin-username" class="form-control" placeholder="admin"
                            autocomplete="username" required />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="admin-password">Password</label>
                    <div class="input-group">
                        <span class="input-icon"><i class="fa-solid fa-key"></i></span>
                        <input type="password" id="admin-password" class="form-control"
                            placeholder="Enter admin password" autocomplete="current-password" required />
                        <button type="button" class="password-toggle" id="admin-pwd-toggle"
                            aria-label="Toggle password visibility">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg"
                    style="background:linear-gradient(135deg,#0f3460,#1a1a2e);box-shadow:0 8px 32px rgba(15,52,96,0.4)">
                    <i class="fa-solid fa-lock"></i> Admin Login
                </button>
            </form>

            <div class="auth-footer">
                <p><a href="student-login.html"><i class="fa-solid fa-user"></i> Student Portal</a></p>
                <p style="margin-top:8px"><a href="../index.html"><i class="fa-solid fa-arrow-left"></i> Back to
                        Homepage</a></p>
            </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/admin.js"></script>
</body>

</html>
